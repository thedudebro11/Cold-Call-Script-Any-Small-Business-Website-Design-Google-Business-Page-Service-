<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cold Call Toolkit — Oscar</title>
<style>
  :root { --bg: #0a0a0a; --surface: #141414; --border: #222; --accent: #FF6B35; --text: #f0f0f0; --muted: #888; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .wrap { max-width: 480px; width: 100%; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  h1 em { color: var(--accent); font-style: normal; }
  .sub { color: var(--muted); margin-bottom: 36px; font-size: 15px; }
  .card { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; text-decoration: none; color: var(--text); margin-bottom: 12px; transition: border-color .2s; }
  .card:hover { border-color: var(--accent); }
  .card-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
  .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .card p { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Cold Call <em>Toolkit</em></h1>
  <p class="sub">Oscar — Web Design &amp; Local SEO, Tucson AZ</p>
  <a class="card" href="/call-assistant.html">
    <div class="card-label">Use on your phone</div>
    <h2>Call Assistant</h2>
    <p>7-step live call guide with ROI calculator and notes</p>
  </a>
  <a class="card" href="/pitch-sheet.html">
    <div class="card-label">Share with prospects</div>
    <h2>Pitch Sheet</h2>
    <p>One-pager to screen-share or send after a call</p>
  </a>
</div>
</body>
</html>
